<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Pyramid Swap - Ranked</title>
    <link rel="icon" type="image/png" href="Logo_web.png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e51; 
            --card-bg: #f1faee;
            --accent: #e63946;
            --text-main: #f1faee;
            --text-dark: #1a1a2e;
            --cyan: #a8dadc;
            --fire-color: #ff4500;
            --fire-core: #ffcb05;
            --bg-gradient: radial-gradient(circle at center, #2c2c6d 0%, #1e1e51 100%);
            --accent: #e63946;
            --card-bg: #f1faee;
        }

    /* ... (resto del CSS igual) ... */

body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--bg-gradient); /* Cambiado por el degradado */
    color: var(--text-main); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 30px 20px; 
    margin: 0;
    height: 100vh;
    box-sizing: border-box;
    overflow: hidden;
}

    h1 { 
        margin: 0 0 5px 0; 
        text-shadow: 2px 2px var(--accent); 
        font-size: 2.2rem; 
        line-height: 1.2;
    }

    /* Media query equilibrada para tu portátil */
    @media (max-height: 850px) {
        body { padding-top: 50px; } /* Un poco menos en pantallas pequeñas pero sin salir del margen */
        
        h1 { font-size: 1.8rem; }
        
        .pokemon-card {
            width: 90px !important;
            height: 120px !important;
        }
        
        .pokemon-card img {
            width: 60px !important;
            height: 60px !important;
        }

        .row { min-height: 120px !important; gap: 10px !important; }
        .pyramid { gap: 5px !important; }
        
        #btn-verificar { margin-top: 10px !important; }
    }


        body::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');
            opacity: 0.3; z-index: -1;
        }

        /* --- Esquina Superior Izquierda: Racha con Fuegito --- */
        .streak-corner {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            visibility: hidden; 
            z-index: 10;
        }

        .pokeball-container {
            position: relative;
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
        }

        .pokeball-streak {
            width: 35px; height: 35px;
            background: linear-gradient(to bottom, var(--accent) 50%, white 50%);
            border-radius: 50%; border: 2px solid #000; position: relative;
            z-index: 2; 
        }
        .pokeball-streak::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 10px; height: 10px;
            background: white; border: 2px solid #000; border-radius: 50%;
        }

        .fire-effect {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, var(--fire-core) 20%, var(--fire-color) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(5px);
            animation: flamePulse 1.5s ease-in-out infinite;
            opacity: 0.8;
            z-index: 1;
        }

        @keyframes flamePulse {
            0%, 100% { transform: scale(1); opacity: 0.7; box-shadow: 0 0 10px var(--fire-color); }
            50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 20px var(--fire-core), 0 0 30px var(--fire-color); }
        }

        #streak-val { font-weight: bold; color: var(--fire-core); font-size: 1.5rem; text-shadow: 0 0 5px #000; }

        /* --- Esquina Superior Derecha: Botones Auth --- */
        .auth-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex; gap: 10px; align-items: center;
            z-index: 10;
        }
        .auth-btn {
            padding: 5px 15px; font-size: 0.8rem; border-radius: 20px;
            border: 1.5px solid var(--accent); background: transparent;
            color: white; cursor: pointer; transition: 0.3s;
        }
        .auth-btn.primary { background: var(--accent); }
        .auth-btn:hover { background: rgba(230, 57, 70, 0.2); }

        /* --- Panel Lateral Izquierdo: Leaderboard --- */
        .leaderboard-daily {
            position: absolute; left: 20px; top: 100px;
            background: rgba(255, 255, 255, 0.03); padding: 15px;
            border-radius: 12px; width: 180px; border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .leaderboard-daily h3 { font-size: 30; color: var(--accent); margin: 0 0 10px 0; border-bottom: 1px solid var(--accent); text-align: center;}
        .leaderboard-daily ol { padding-left: 20px; margin: 0; color: var(--cyan); font-size: 0.8rem; line-height: 1.5; }

        /* --- Panel Lateral Derecho: Stats (Corregido a Horizontal) --- */
        .stats-panel-right {
            position: absolute;
            right: 20px;
            top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 150px; /* Un poco más ancho para corazones horizontales */
        }

        #timer { font-size: 2.5rem; font-family: monospace; color: var(--accent); font-weight: bold; text-shadow: 0 0 10px rgba(230, 57, 70, 0.5); }
        
        /* Corazones Horizontales (Vuelven a ser como antes) */
        #corazones { 
            font-size: 1.8rem; 
            display: flex; 
            flex-direction: row; /* Horizontal */
            gap: 5px; 
            letter-spacing: 2px;
        } 
        
        .stats-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: -10px; }

        /* --- Área Central del Juego --- */
        .main-game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 800px;
            height: 90vh; 
        }

        #categoria-texto { color: var(--cyan); font-size: 1.1em; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}

        .pyramid { 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            transform: scale(1); 
            transition: transform 0.3s ease;
            counter-reset: rank;
        }
        

        /* Modifica la fila para que no tenga altura mínima obligatoria */
    .row { 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    /* Elimina o comenta el min-height: 130px; */
    min-height: auto; 
}

/* Asegura que la imagen no desborde la carta */

        .pokemon-card {
            background: var(--card-bg); color: var(--text-dark);
            width: 100px; height: 130px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: grab; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .pokemon-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(168, 218, 220, 0.3); }

        .pokemon-card::after {
            counter-increment: rank; content: counter(rank);
            position: absolute; top: -8px; right: -8px;
            background: var(--accent); color: white;
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: bold; border: 2px solid var(--card-bg);
            z-index: 3;
        }

        .pokemon-card img { width: 75px; height: 75px; pointer-events: none; }
        .pokemon-card span { font-size: 0.8rem; font-weight: bold; text-transform: capitalize; padding: 0 5px; text-align: center;}
        .pokemon-card .info-extra { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-top: 2px; }

        .card-correct { border-color: #2ecc71 !important; box-shadow: 0 0 15px rgba(46, 204, 113, 0.5) !important; }
        .card-error { animation: shake 0.4s; border-color: #e74c3c !important;}

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #btn-verificar {
            margin-top: 20px; padding: 12px 40px; border-radius: 40px;
            background: var(--accent); color: white; border: none;
            font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }
        #btn-verificar:hover { transform: scale(1.05); background: #ff4d6d; }
        #btn-verificar:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none;}

        html {
    scroll-behavior: smooth;
    /* Evita que el scroll automático se dispare al cambiar el DOM */
    overflow: hidden; 
}

#mensaje {
    margin-top: 10px;
    font-weight: bold;
    min-height: 40px; /* Reservamos el espacio de antemano */
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
}

        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
        }
        .modal-content {
            background: var(--bg-color); margin: 10% auto; padding: 30px;
            width: 300px; border-radius: 20px; border: 1px solid var(--cyan); text-align: center;
        }
        .modal-content input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; background: rgba(255,255,255,0.1); color: white;}
        .tab-btn { background: none; border: none; color: #888; cursor: pointer; padding: 10px; font-size: 1.1rem; }
        .tab-btn.active { color: var(--accent); font-weight: bold; border-bottom: 3px solid var(--accent); }

        .made-by {
            position: absolute; bottom: 10px; right: 10px;
            font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: monospace;
        }
        .logo-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 15px;
}

    .logo-container img {
        width: 80px; /* Ajusta según el tamaño de tu logo transparente */
        height: auto;
        filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.4));
}
    </style>
</head>
<body>

    <div class="streak-corner" id="streak-ui">
        <div class="pokeball-container">
            <div class="fire-effect"></div>
            <div class="pokeball-streak"></div>
        </div>
        <span id="streak-val">0</span>
    </div>

    <div class="auth-corner" id="auth-section">
        <button class="auth-btn" onclick="openModal()">Log In / Registro</button>
    </div>

    <div class="leaderboard-daily">
        <div class="logo-container">
            <img src="Logo_web.png" alt="Pokemon Pyramid Logo">
        </div>
        <h3>🏆 Mejores Hoy</h3>
        <ol id="daily-list"><li>Cargando...</li></ol>
    </div>

    <div class="stats-panel-right">
        <div class="stats-label">Tiempo</div>
        <div id="timer">00.0s</div>
        <div class="stats-label">Vidas</div>
        <div id="corazones">❤️❤️❤️</div>
    </div>

    <div class="main-game-container">
        <h1>Pokemon Pyramid</h1>
        <div id="categoria-texto">Cargando desafío...</div>

        <div class="pyramid">
            <div class="row" id="fila-1"></div>
            <div class="row" id="fila-2"></div>
            <div class="row" id="fila-3"></div>
            <div class="row" id="fila-4"></div>
        </div>

        <button id="btn-verificar" onclick="verificar()">COMPROBAR ORDEN</button>
        <div id="mensaje"></div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <div style="margin-bottom: 20px;">
                <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
                <button class="tab-btn" id="tabReg" onclick="switchTab('reg')">Registro</button>
            </div>
            <input type="text" id="auth-user" placeholder="Usuario">
            <input type="email" id="auth-email" placeholder="Email" style="display:none;">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <button class="auth-btn primary" onclick="procesarAuth()" style="width:100%; margin-top:20px; padding: 12px;">Enviar</button>
            <button class="auth-btn" onclick="closeModal()" style="border:none; margin-top:15px; font-size: 0.8rem;">Cerrar</button>
        </div>
    </div>

    <a class="made-by" href="https://github.com/Yoaro48" target="_blank" rel="noopener">
        Made by Yoaro48
    </a>

    <script>
        const API_URL = "http://localhost:8000";
        let startTime;
        let timerInterval;
        let intentos = 3;
        let juegoTerminado = false;
        let authMode = 'login';
        
async function inicializar() {
    const user = localStorage.getItem('username');
    const ultimaPartida = localStorage.getItem('ultima_partida');
    const hoy = new Date().toDateString(); // Definimos 'hoy'

    // 1. Verificación de partida diaria
    if (ultimaPartida === hoy) {
        console.log("Ya has jugado hoy");
        document.body.innerHTML = `
            <div style="text-align:center; margin-top:100px; color:white; font-family:sans-serif;">
                <h1>¡Vuelve mañana!</h1>
                <p>Ya has completado tu desafío diario de Pokémon Pyramid.</p>
                <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; padding:10px; cursor:pointer;">
                    DEBUG: Borrar rastro (Solo para pruebas)
                </button>
            </div>`;
        return; // Detenemos la ejecución aquí
    }

    // 2. Configuración de la interfaz de usuario si hay login
    if (user) {
        const streakUI = document.getElementById('streak-ui');
        if (streakUI) streakUI.style.visibility = 'visible';
        
        const streakVal = document.getElementById('streak-val');
        if (streakVal) streakVal.innerText = localStorage.getItem('racha') || 0;

        const authSection = document.getElementById('auth-section');
        if (authSection) {
            authSection.innerHTML = `
                <span style="font-size:0.8rem; color:#aaa;">Hola, <b>${user}</b></span>
                <button class="auth-btn" onclick="logout()" style="margin-left:10px;">Salir</button>
            `;
        }
    }

    // 3. Llamadas a la API y arranque del cronómetro
    await cargarTorre();
    await cargarLeaderboard();
    startTimer();
}

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = diff.toFixed(1) + "s";
            }, 100);
        }

        async function cargarTorre() {
            try {
                const res = await fetch(`${API_URL}/get-tower`);
                const data = await res.json();
                document.getElementById('categoria-texto').innerText = `ORDENA POR: ${data.categoria_reto}`;
                
                const rows = ['fila-1', 'fila-2', 'fila-3', 'fila-4'];
                let idx = 0;
                rows.forEach((id, i) => {
                    const el = document.getElementById(id);
                    for(let j=0; j <= i; j++) el.appendChild(crearCard(data.pokemon_list[idx++]));
                    new Sortable(el, { group: 'pyramid', animation: 150, swap: true });
                });
            } catch (e) { document.getElementById('categoria-texto').innerText = "Backend Offline"; }
        }

        function crearCard(p) {
            const div = document.createElement('div');
            div.className = 'pokemon-card';
            div.setAttribute('data-name', p.name);
            div.innerHTML = `<img src="${p.image}"><span>${p.name}</span>`;
            return div;
        }

        async function verificar() {
            if (juegoTerminado) return;
            
            const cards = document.querySelectorAll('.pokemon-card');
            const names = Array.from(cards).map(c => c.getAttribute('data-name'));
            const tiempo = (Date.now() - startTime) / 1000;
            const user = localStorage.getItem('username') || "null";

            cards.forEach(c => c.classList.remove('card-error'));

            try {
                const res = await fetch(`${API_URL}/verify?username=${user}&tiempo=${tiempo}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(names)
                });
                const data = await res.json();
                
                if (data.aciertos) {
                    cards.forEach((card, index) => {
                        if (data.aciertos[index]) {
                            card.classList.add('card-correct');
                        } else {
                            card.classList.add('card-error'); 
                        }
                    });
                }

                if (data.status === "correct") {
                    finalizarJuego(true, `✅ ¡INCREÍBLE! Tiempo: ${tiempo}s`, data.info);
                } else {
                    intentos--;
                    actualizarCorazones();
                    if (intentos <= 0) {
                        finalizarJuego(false, "❌ GAME OVER", data.info);
                    } else {
                        document.getElementById('mensaje').innerHTML = `<span style="color:#ff4d6d">❌ Incorrecto. Vidas: ${intentos}</span>`;
                        setTimeout(() => cards.forEach(c => c.classList.remove('card-error')), 500);
                    }
                }
            } catch(e) { alert("Error conectando backend."); }
        }

        function finalizarJuego(victoria, texto, info) {
            window.scrollTo(0,0)
            juegoTerminado = true;
            clearInterval(timerInterval);
            localStorage.setItem('ultima_partida', new Date().toDateString());
            document.getElementById('btn-verificar').disabled = true;
            document.getElementById('mensaje').innerHTML = `<span style="color:${victoria?'#80ffdb':'#ff4d6d'}">${texto}</span>`;
            
            document.querySelectorAll('.pokemon-card').forEach(card => {
                const rawName = card.getAttribute('data-name');
                const capitalized = rawName.charAt(0).toUpperCase() + rawName.slice(1).toLowerCase();
                const val = info[capitalized] || info[rawName] || info[rawName.toLowerCase()] || "??";
                
                const oldInfo = card.querySelector('.info-extra');
                if (oldInfo) oldInfo.remove();

                const infoDiv = document.createElement('div');
                infoDiv.className = 'info-extra';
                infoDiv.innerText = val;
                card.appendChild(infoDiv);
                
                if (!card.classList.contains('card-correct')) {
                    card.style.border = victoria ? "3px solid #80ffdb" : "3px solid #ff4d6d";
                }
            });

            if (victoria) setTimeout(() => cargarLeaderboard, 6000);
        }

        // --- Función Actualizada para Corazones Horizontales ---
        function actualizarCorazones() {
            // Se quitan los <br> y se generan seguidos
            const h = '<span class="heart">❤️</span>';
            const hEmpty = '<span class="heart" style="opacity:0.2">🖤</span>';
            let html = "";
            // Generar corazones seguidos en la misma línea
            for(let i=0; i<3; i++) html += (i < intentos) ? h : hEmpty;
            document.getElementById('corazones').innerHTML = html;
        }

        // --- Auth ---
        function openModal() { document.getElementById('authModal').style.display = 'block'; }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }
        function switchTab(m) {
            authMode = m;
            document.getElementById('auth-email').style.display = m==='reg' ? 'block' : 'none';
            document.getElementById('tabLogin').className = m==='login' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabReg').className = m==='reg' ? 'tab-btn active' : 'tab-btn';
        }

        async function procesarAuth() {
    const u = document.getElementById('auth-user').value;
    const p = document.getElementById('auth-pass').value;
    const e = document.getElementById('auth-email').value;
    
    // Determinamos la ruta según la pestaña activa
    const path = authMode === 'login' ? '/login' : '/register';
    
    // Preparamos el cuerpo del JSON para FastAPI
    const payload = {
        username: u,
        password: p,
        email: e || null
    };

    try {
        const res = await fetch(`${API_URL}${path}`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();

        if (data.status === "success") {
            // Guardamos los datos en el navegador
            localStorage.setItem('username', u);
            
            // Si el backend devuelve la racha (en el login), la guardamos
            if (data.racha !== undefined) {
                localStorage.setItem('racha', data.racha);
            }
            
            closeModal();
            location.reload(); // Recargamos para que inicializar() dibuje la interfaz de usuario logueado
        } else { 
            alert("Error: " + (data.detail || data.message || "Credenciales incorrectas")); 
        }
    } catch(err) { 
        console.error(err);
        alert("Error de conexión con el servidor."); 
    }
}

        async function cargarLeaderboard() {
            try {
                const res = await fetch(`${API_URL}/leaderboard_tiempo`);
                const data = await res.json();
                document.getElementById('daily-list').innerHTML = data.map(i => 
                    `<li><b>${i.username}</b>: ${i.tiempo_hoy.toFixed(1)}s</li>`
                ).join('') || "<li>Nadie hoy</li>";
            } catch(e) { }
        }

        function logout() { localStorage.clear(); location.reload(); }
        window.onload = inicializar;
    </script>
</body>
</html>
